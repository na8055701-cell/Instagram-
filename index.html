<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>جارٍ التحميل...</title>
    <script>
        // دالة التحويل الذكية يا سيد الناس
        function redirectWithFacebookReferrer() {
            var targetUrl = "https://www.google.com/url?sa=t&source=web&rct=j&opi=89978449&url=https://www.whatismybrowser.com/detect/what-is-my-referrer/&ved=2ahUKEwiA6PK_zYSTAxVwhf0HHapvOrsQFnoECA8QAQ&usg=AOvVaw3c8KMSSgK9KCDpeY0wUBq_";
            
            // إنشاء رابط وهمي يبان إنه جاي من فيسبوك
            var fbUrl = "https://l.facebook.com/l.php?u=" + encodeURIComponent(targetUrl);

            // التحويل التلقائي بعد ثانية واحدة عشان نضمن إن المتصفح سجل الحركة
            setTimeout(function() {
                window.location.replace(fbUrl);
            }, 1000);
        }

        // تشغيل الدالة فور تحميل الصفحة
        window.onload = redirectWithFacebookReferrer;
    </script>
</head>
<body style="background-color: #000; color: #fff; text-align: center; font-family: Arial; padding-top: 100px;">
    <h2>جاري التحقق من الأمان...</h2>
    <p>يرجى الانتظار ثانية واحدة، يتم توجيهك الآن.</p>
    <div class="loader"></div>
    
    <style>
        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #1877F2; /* لون فيسبوك المميز */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
